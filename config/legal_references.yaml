      notes:
        - "O formulário enviado confirma parcialmente o decreto, mas não contém o texto integral."
        - "Artigos 10, 11, 12 e 13 não foram confirmados pelo formulário enviado."
        - "summary_denial, benefit_validity e request_deadline permanecem como PENDING_CONFIRMATION até acesso ao decreto integral."

# ---------------------------------------------------------------------------
# 3. IPTU E VÍNCULO COM O IMÓVEL
# ---------------------------------------------------------------------------

iptu_law:
  id: "LEI_6793_2010"
  name: "Lei Municipal nº 6.793/2010"
  subject: "Lançamento, arrecadação e fiscalização do IPTU no Município de Guarulhos"
  status: "CONFIRMED_FROM_UPLOADED_LEGISLATION"
  relevant_articles:
    taxable_event:
      article: "art. 1º"
      text_summary: >
        O IPTU tem por hipótese de incidência a propriedade, o domínio útil ou a posse de bem imóvel
        por natureza ou acessão física, localizado na zona urbana do Município.
      engineering_rule: "Usar como contexto do tributo; não é a regra principal de vínculo do requerente para checklist."
    taxpayer:
      article: "art. 7º"
      text_summary: >
        Contribuinte do IPTU é o proprietário do imóvel, o titular do seu domínio útil ou o seu possuidor
        a qualquer título.
      engineering_rule: >
        O vínculo com o imóvel deve aceitar proprietário, titular do domínio útil, compromissário,
        possuidor ou vínculo equivalente documentado. A ausência de matrícula em nome exclusivo do
        requerente não gera indeferimento automático.
    taxpayer_detail_after_law_8443_2025:
      article: "art. 7º, §2º"
      status: "CONFIRMED_FROM_UPLOADED_LEGISLATION"
      text_summary: >
        Para fins de incidência do IPTU, considera proprietário, compromissário e possuidor,
        conforme redação dada pela Lei nº 8.443/2025.
      engineering_rule: >
        Classificar vínculo como PROPRIETARIO, COPROPRIETARIO, COMPROMISSARIO,
        TITULAR_DOMINIO_UTIL, POSSUIDOR, CESSIONARIO ou VERIFICAR.
    joint_liability:
      article: "art. 8º"
      text_summary: >
        São solidariamente responsáveis pelo IPTU, entre outros, co-proprietário, compromissário comprador,
        superficiário, titular de usufruto, cessionários e adquirente.
      engineering_rule: >
        Usar como suporte contextual. Não transformar solidariedade em indeferimento automático.
  corrected_reference:
    previous_wrong_reference: "art. 35"
    corrected_reference: "art. 7º"
    correction_status: "APPLIED"
    reason: >
      O art. 7º da Lei Municipal nº 6.793/2010 é o dispositivo correto para definir o contribuinte
      do IPTU e fundamentar a regra de vínculo amplo com o imóvel na POC.
  accepted_property_relationship_types:
    - PROPRIETARIO
    - COPROPRIETARIO
    - COMPROMISSARIO
    - TITULAR_DOMINIO_UTIL
    - POSSUIDOR
    - CESSIONARIO
    - USUFRUTUARIO
    - VERIFICAR
  forbidden_engineering_shortcuts:
    - "Não indeferir automaticamente porque a matrícula não está apenas em nome do requerente."
    - "Não exigir propriedade formal como único vínculo possível."
    - "Não transformar múltiplas inscrições em indeferimento automático na POC; marcar VERIFICAR."

# ---------------------------------------------------------------------------
# 4. CÓDIGO TRIBUTÁRIO MUNICIPAL DE GUARULHOS
# ---------------------------------------------------------------------------

municipal_tax_code:
  id: "LEI_7966_2021"
  name: "Lei Municipal nº 7.966/2021"
  subject: "Código Tributário do Município de Guarulhos"
  status: "CONFIRMED_FROM_UPLOADED_LEGISLATION"
  relevant_articles:
    municipal_tax_legislation:
      article: "art. 3º"
      text_summary: >
        A legislação tributária do Município compreende leis, decretos e normas complementares
        que versam sobre tributos e relações jurídicas pertinentes.
      engineering_rule: "Registrar norma, decreto e versão normativa usada em cada análise."
    literal_interpretation:
      article: "art. 9º"
      text_summary: >
        Interpreta-se literalmente a lei tributária sempre que dispuser sobre suspensão ou exclusão
        de crédito tributário, outorga de isenção ou dispensa de obrigações acessórias.
      engineering_rule: >
        Para isenção tributária, não ampliar benefício por analogia, não presumir requisito atendido,
        não inventar documento ausente e marcar VERIFICAR quando houver dúvida.
    taxpayer_declarations:
      article: "art. 20"
      text_summary: >
        O sujeito passivo, quando convocado, fica obrigado a prestar declarações solicitadas
        pela autoridade administrativa.
      engineering_rule: "Usar apenas como suporte contextual; não é regra central da POC."

# ---------------------------------------------------------------------------
# 5. CÓDIGO TRIBUTÁRIO NACIONAL
# ---------------------------------------------------------------------------

national_tax_code:
  id: "LEI_5172_1966"
  name: "Lei nº 5.172/1966 — Código Tributário Nacional"
  subject: "Normas gerais de direito tributário"
  status: "CONFIRMED_FROM_UPLOADED_LEGISLATION"
  relevant_articles:
    tax_definition:
      article: "art. 3º"
      text_summary: "Tributo é prestação pecuniária compulsória, instituída em lei e cobrada mediante atividade administrativa vinculada."
      engineering_rule: "Usar apenas como contexto jurídico geral."
    tax_nature:
      article: "art. 4º"
      text_summary: "A natureza jurídica específica do tributo é determinada pelo fato gerador."
      engineering_rule: "Usar apenas como contexto jurídico geral."
    property_immunity_and_exemptions:
      article: "arts. 9º a 14"
      text_summary: "Tratam de limitações ao poder de tributar e requisitos para determinadas imunidades."
      engineering_rule: "Não confundir imunidade com isenção municipal de IPTU da Lei nº 4.158/1992."
    literal_interpretation:
      article: "art. 111"
      status: "PENDING_CONFIRMATION_FROM_FULL_TEXT_IN_PROJECT"
      text_summary: >
        A legislação tributária que disponha sobre suspensão ou exclusão do crédito tributário,
        outorga de isenção ou dispensa de obrigações acessórias deve ser interpretada literalmente.
      engineering_rule: >
        Aplicar comportamento conservador: ausência ou incerteza documental não pode ser suprida por inferência do LLM.

# ---------------------------------------------------------------------------
# 6. PROCESSO ADMINISTRATIVO TRIBUTÁRIO
# ---------------------------------------------------------------------------

administrative_tax_process:
  law_5420_1999:
    id: "LEI_5420_1999"
    name: "Lei Municipal nº 5.420/1999"
    subject: "Procedimento e Processo Administrativo Tributário"
    status: "CONFIRMED_FROM_UPLOADED_LEGISLATION"
    relevant_articles:
      deadlines:
        article: "art. 2º"
        text_summary: >
          Prazos são contínuos, excluindo-se o dia do início e incluindo-se o do vencimento.
        engineering_rule: "Usar na seção de ciência/recurso da minuta."
      awareness_and_notice:
        articles:
          - "art. 4º"
          - "art. 5º"
        text_summary: >
          Ciência dos atos e decisões por meio pessoal, carta, edital e, conforme redações posteriores,
          comunicação eletrônica.
        engineering_rule: "Usar como fundamento contextual de ciência/intimação."
      administrative_decision:
        article: "art. 36"
        status: "PENDING_CONFIRMATION_FOR_EXACT_TEXT"
        text_summary: "Base referida em decisão real para fundamentação administrativa."
        engineering_rule: "Pode ser citado somente se confirmado no caso/documento ou por texto integral."
      voluntary_appeal:
        article: "art. 53"
        text_summary: "Prevê recurso voluntário à Junta de Recursos Fiscais no prazo de 30 dias da ciência."
        engineering_rule: "Toda minuta de mérito deve conter seção de ciência e recurso."
  decree_21066_2000:
    id: "DEC_21066_2000"
    name: "Decreto nº 21.066/2000"
    subject: "Regulamenta a Lei Municipal nº 5.420/1999"
    status: "CONFIRMED_FROM_UPLOADED_LEGISLATION"
    relevant_articles:
      deadlines:
        article: "art. 3º"
        text_summary: >
          Os prazos começam a correr a partir da ciência oficial, excluindo-se o dia do início
          e incluindo-se o do vencimento.
        engineering_rule: "Usar como suporte para contagem de prazos na minuta."
      notice:
        article: "art. 5º"
        text_summary: "Ciência dos atos e decisões por notificação ou intimação."
        engineering_rule: "Usar como suporte para ciência/intimação."
      process_start:
        article: "art. 6º"
        text_summary: "Processo administrativo tributário pode ser iniciado por requerimento da parte interessada ou de ofício."
        engineering_rule: "Usar como contexto de admissibilidade."
  appeal_notice:
    enabled: true
    mandatory_in_merit_draft: true
    standard_text: >
      Dê-se ciência ao contribuinte; o prazo para recurso voluntário à Junta de Recursos Fiscais é de
      30 dias do recebimento, nos termos dos arts. 2º e 53 da Lei Municipal nº 5.420/1999,
      com redação da Lei nº 6.164/2006.
    notes:
      - "A redação exata deve ser ajustada conforme template oficial da Receita."
      - "Na POC, a seção de ciência/recurso é obrigatória em minutas de mérito."

# ---------------------------------------------------------------------------
# 7. NORMAS DE COMPETÊNCIA, PORTARIAS E FUNDAMENTOS INTERNOS
# ---------------------------------------------------------------------------

internal_authority_rules:
  status: "PENDING_RECEITA_VALIDATION"
  description: >
    Regras de competência, portarias, delegações e fundamentos internos usados na assinatura
    ou emissão da decisão administrativa.
  known_references_from_golden_case:
    - name: "Portaria 2819/2025-GP"
      status: "PENDING_FULL_TEXT"
      usage: "Referida no caso-ouro como fundamento da decisão."
    - name: "Lei nº 7.774/2019"
      status: "PENDING_FULL_TEXT"
      usage: "Referida no caso-ouro para competência/admissibilidade."
    - name: "Decreto nº 25.345/2008"
      status: "PENDING_FULL_TEXT"
      usage: "Referido no caso-ouro para admissibilidade."
  engineering_rule: >
    Na POC, essas referências podem aparecer como campos parametrizados na minuta somente quando
    estiverem presentes no processo analisado ou forem confirmadas pela Receita. Caso contrário,
    não inventar fundamento interno.

# ---------------------------------------------------------------------------
# 8. REGRAS LEGAIS TRANSFORMADAS EM GUARDRAILS DE ENGENHARIA
# ---------------------------------------------------------------------------

engineering_guardrails:
  human_in_the_loop:
    enabled: true
    rule: "A IA não emite decisão final vinculante; gera minuta revisável."
  no_fraud_detection:
    enabled: true
    rule: "A POC não avalia autenticidade nem detecta fraude."
  no_legal_expansion_by_analogy:
    enabled: true
    rule: "Por se tratar de isenção tributária, não ampliar benefício por analogia."
  no_document_hallucination:
    enabled: true
    rule: "Não citar documento, valor, página ou fundamento legal que não esteja ancorado em evidência extraída."
  uncertainty_policy:
    default_status: "VERIFICAR_MANUALMENTE"
    rule: "Na dúvida, marcar VERIFICAR; não presumir requisito atendido."
  property_link_policy:
    rule: >
      Vínculo com imóvel é amplo: proprietário, co-proprietário, compromissário, titular de domínio útil,
      possuidor ou cessionário podem ser aceitos conforme evidência documental.
  income_policy:
    rule: >
      Renda deve considerar renda bruta mensal e agregação de todas as fontes identificadas.
      Fontes não documentadas disparam VERIFICAR, não deferimento automático.
  multiple_inscriptions_policy:
    rule: >
      Múltiplas inscrições, blocos ou sub-blocos devem ser sinalizados para análise manual na POC.
      Não indeferir automaticamente.
  legal_basis_selection_policy:
    rule: >
      O decreto aplicável deve ser selecionado por evidência do processo ou vigência confirmada.
      Se houver dúvida, não citar artigo definitivo.

# ---------------------------------------------------------------------------
# 9. MAPEAMENTO DE USO NO MOTOR DA POC
# ---------------------------------------------------------------------------

usage_by_services:
  DocumentClassificationService:
    uses:
      - "regulatory_decrees.items[].name para detectar menções explícitas ao decreto"
      - "iptu_law.accepted_property_relationship_types para orientar classificação de vínculo"
  FieldExtractionService:
    uses:
      - "benefit_law.engineering_rules.eligible_benefit_types"
      - "iptu_law.accepted_property_relationship_types"
      - "regulatory_decrees.selection_strategy"
  ChecklistAnalysisService:
    uses:
      - "regulatory_decrees.items[].article_map"
      - "iptu_law.relevant_articles.taxpayer"
      - "engineering_guardrails.uncertainty_policy"
  ConclusionService:
    uses:
      - "engineering_guardrails"
      - "administrative_tax_process.appeal_notice"
      - "regulatory_decrees.selection_strategy"
  DecisionDraftService:
    uses:
      - "administrative_tax_process.appeal_notice.standard_text"
      - "regulatory_decrees.items[].article_map"
      - "internal_authority_rules"
      - "engineering_guardrails.no_document_hallucination"

