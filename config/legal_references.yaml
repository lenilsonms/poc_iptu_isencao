# config/legal_references.yaml
#
# Configuração legal congelada para a POC do Agente de IA de Isenção de IPTU
# Município de Guarulhos/SP
#
# Status:
# - Válido para implementação e demonstração da POC.
# - Não deve ser tratado como base legal definitiva de produção.
# - Campos PENDING_CONFIRMATION exigem confirmação por texto normativo integral
#   ou validação formal da Secretaria da Receita.

metadata:
  config_name: legal_references
  version: "1.3.0-sprint1-vigencias"
  frozen: false
  frozen_at: null
  legal_review_status: "PARTIALLY_VALIDATED_FROM_UPLOADED_LEGISLATION"
  changelog:
    - "1.3.0-sprint1-vigencias: vigências confirmadas pelo passo a passo SRC (07/07/2026): DEC_22429_2003 até 12/03/2018; DEC_34767_2018 de 13/03/2018 a 16/04/2025; DEC_42621_2025 de 17/04/2025 a 12/03/2026. Resolve PENDING_DECREE_CUTOFF_DATE."
    - "1.3.0-sprint1-vigencias: adicionado DEC_22429_2003 (regime histórico); adicionado conservative_year_to_regime; exercícios de transição (2018, 2025) caem no fallback (ADR-S1-01)."
    - "1.2.0-poc-p0-fixes: adicionada revocation_policy (norma revogada continua aplicável a processos do seu período de vigência)."
    - "1.2.0-poc-p0-fixes: confirmado e travado o article_map do Decreto 34.767/2018 (art. 3º = outras fontes de renda; art. 7º = indeferimento de plano), superando o mapa divergente do documento de requisitos .md."
  pending_documents:
    - "Lei nº 8.430/2025"
    - "Decreto nº 42.621/2025 integral"
  project: "poc_iptu_ai"
  municipality: "Guarulhos/SP"
  product: "Agente de IA para Triagem e Minuta de Isenção de IPTU"
  scope:
    - "Isenção de IPTU para aposentados"
    - "Isenção de IPTU para pensionistas"
    - "Isenção de IPTU para beneficiários LOAS"
    - "Análise documental e admissibilidade de 1ª instância"
    - "Geração de minuta revisável"
  out_of_scope:
    - "Produtor rural"
    - "Segunda instância/JRF"
    - "Detecção de fraude"
    - "Validação de autenticidade documental"
    - "Integração real com SEI"
    - "Integração ao vivo com bases externas"
    - "Decisão final vinculante"
  source_documents:
    - "Documento de Requisitos — Agente de IA para Análise de Isenção de IPTU (Guarulhos)"
    - "Análise do Caso-Ouro SEI 1101.2023/0005737-8"
    - "Avaliação Arquitetural — POC Agente de Isenção de IPTU"
    - "Declaração do Regime de Ocupação — Decreto nº 42.621/2025"
  notes:
    - "Esta configuração é a baseline técnica da POC."
    - "A decisão final continua sendo da autoridade competente; a IA gera minuta revisável."
    - "O motor deve selecionar o decreto regulamentador por menção explícita no PDF, data de protocolo ou exercício pleiteado."
    - "Quando não for possível selecionar o regime normativo com segurança, o status deve ser VERIFICAR_MANUALMENTE."
    - "Referências marcadas como PENDING_CONFIRMATION não devem ser usadas como fundamento definitivo sem confirmação."

# ---------------------------------------------------------------------------
# 1. NORMA BASE DO BENEFÍCIO
# ---------------------------------------------------------------------------

benefit_law:
  id: "LEI_4158_1992"
  name: "Lei Municipal nº 4.158/1992"
  subject: "Concessão de isenção de IPTU para aposentados, pensionistas e beneficiários LOAS"
  status: "REVOGADA"
  revoked_by: "Lei nº 8.430/2025"
  role_in_poc:
    - "Definir quem tem direito ao benefício"
    - "Definir o limite de renda aplicável"
    - "Servir como norma base citada na minuta"
  amendments:
    - id: "LEI_6192_2006"
      name: "Lei Municipal nº 6.192/2006"
      status: "PENDING_FULL_TEXT"
    - id: "LEI_7460_2016"
      name: "Lei Municipal nº 7.460/2016"
      status: "PENDING_FULL_TEXT"
    - id: "LEI_8285_2024"
      name: "Lei Municipal nº 8.285/2024"
      status: "PENDING_FULL_TEXT"
  engineering_rules:
    eligible_benefit_types:
      - APOSENTADO
      - PENSIONISTA
      - LOAS
    excluded_from_poc:
      - PRODUTOR_RURAL
    income_limit:
      unit: "SALARIO_MINIMO"
      multiplier: 5
      basis: "RENDA_BRUTA_MENSAL"
      allow_multiple_income_sources: true
    multiple_properties_rule:
      automatic_denial: false
      rule: "Quando houver mais de um imóvel, o benefício pode recair sobre o imóvel em que o beneficiário reside."
    usufruct_rule:
      accepted: true
      rule: "Admitir usufrutuário quando houver escritura pública ou decisão judicial que comprove reserva de usufruto."
    human_review_required: true

# ---------------------------------------------------------------------------
# 1.1 POLÍTICA DE NORMA REVOGADA (P0)
# ---------------------------------------------------------------------------

revocation_policy:
  rule: >
    Uma norma com status REVOGADA/REVOGADO permanece sendo o fundamento aplicável aos
    processos protocolados durante seu período de vigência. A revogação posterior não
    desloca retroativamente o regime aplicável ao processo. Exemplo: o caso-ouro
    (exercício 2024) é corretamente fundamentado no Decreto nº 34.767/2018, ainda que
    revogado pelo Decreto nº 42.621/2025.
  engineering_rule: >
    O motor NÃO deve recusar-se a citar uma norma apenas por estar revogada. Deve citar a
    norma vigente à época do processo, conforme a estratégia de seleção do regime
    (regulatory_decrees.selection_strategy). O status de revogação é informativo para
    rastreabilidade, não um bloqueio de fundamentação.
  applies_to:
    - "benefit_law (Lei nº 4.158/1992, REVOGADA pela Lei nº 8.430/2025)"
    - "regulatory_decrees.items[DEC_34767_2018] (REVOGADO pelo Decreto nº 42.621/2025)"

# ---------------------------------------------------------------------------
# 2. DECRETOS REGULAMENTADORES DA ISENÇÃO
# ---------------------------------------------------------------------------

regulatory_decrees:
  selection_strategy:
    description: "Estratégia de seleção do decreto regulamentador aplicável ao processo."
    priority:
      - "explicit_mention_in_pdf"
      - "protocol_date"
      - "requested_year"
      - "fallback_verify_manually"
    fallback_status: "VERIFICAR_MANUALMENTE"
    conservative_year_to_regime:
      "2004-2017": "DEC_22429_2003"
      "2019-2024": "DEC_34767_2018"
      "2026": "DEC_42621_2025"
    fallback_reason: "Não foi possível selecionar com segurança o decreto aplicável."
    engineering_rule: >
      Se o PDF mencionar explicitamente o Decreto nº 34.767/2018 ou o Decreto nº 42.621/2025,
      essa menção prevalece para a POC. Se não houver menção clara, usar data de protocolo
      ou exercício pleiteado. Persistindo dúvida, não gerar fundamento normativo definitivo;
      marcar VERIFICAR_MANUALMENTE.

  items:
    - id: "DEC_22429_2003"                                 # <- NOVO item
      name: "Decreto nº 22.429/2003"
      subject: "Regulamentação histórica da isenção (regime 2003–2018)"
      status: "REVOGADO"
      revoked_by: "Decreto nº 34.767/2018"
      evidence_status: "CONFIRMED_FROM_SRC_WORKFLOW_DOCUMENT"
      usage_in_poc: "HISTORICAL_REGIME_WITH_WARNING"
      valid_from: "2003-01-01"        # início exato do decreto pendente de texto integral
      valid_until: "2018-03-12"
      article_map:
        summary_denial: "art. 6º"     # fundamentação legal: falta de documentação
        other_income_sources: "PENDING_CONFIRMATION"
      notes:
        - "Incluído a partir do passo a passo SRC. Texto integral pendente (só art. 6º confirmado)."
    - id: "DEC_34767_2018"
      name: "Decreto nº 34.767/2018"
      subject: "Regulamentação histórica da Lei Municipal nº 4.158/1992"
      status: "REVOGADO"
      revoked_by: "Decreto nº 42.621/2025"
      evidence_status: "CONFIRMED_FROM_UPLOADED_LEGISLATION"
      usage_in_poc: "HISTORICAL_REGIME_WITH_WARNING"
      valid_from: "2018-03-13"
      valid_until: "2025-04-16"
      applies_to:
        from: "2018-03-13"
        until: "2025-04-16"
        date_rule_status: "CONFIRMED_FROM_SRC_WORKFLOW_DOCUMENT"
      article_map:
        initial_declaration: "art. 1º"
        document_checklist: "art. 2º"
        other_income_sources: "art. 3º"
        revenue_federal_agreement: "art. 4º"
        property_must_be_split_in_cadastre: "art. 5º"
        block_or_subblock_residence: "art. 6º"
        summary_denial: "art. 7º"
        renewal_rules: "art. 8º"
        iptu_tax_code_after_benefit: "art. 9º"
        request_deadline: "art. 10"
        benefit_transfer_or_property_change: "art. 11"
        duty_to_report_change: "art. 12"
        effective_date_and_revocation: "art. 13"
      poc_usage:
        applicable_when:
          - "Processo menciona expressamente Decreto nº 34.767/2018"
          - "Processo antigo sob regime anterior"
          - "Exercício/data de protocolo anterior à vigência confirmada do Decreto nº 42.621/2025"
        golden_case:
          process: "SEI 1101.2023/0005737-8"
          requested_year: "2024"
          official_result: "INDEFERIDO"
          expected_poc_status: "INDEFERIMENTO_SUGERIDO"
          expected_basis:
            - "Decreto nº 34.767/2018, art. 3º"
            - "Decreto nº 34.767/2018, art. 7º"
      notes:
        - "O caso-ouro demonstrou que processos de exercício 2024 podem estar fundamentados no Decreto nº 34.767/2018."
        - "Não usar automaticamente o Decreto nº 42.621/2025 para processos antigos."
        - "A data final de vigência/revogação ainda precisa ser confirmada por texto normativo integral."
        - "MAPA DE ARTIGOS CONFIRMADO (P0): art. 3º = outras fontes de renda; art. 7º = indeferimento de plano. Este mapa supera o mapa divergente apresentado no documento de requisitos .md (que atribuía art. 3º a imóvel único e art. 6º a outras fontes). O mapa aqui é o que reproduz o fundamento do caso-ouro (art. 3º + art. 7º)."

    - id: "DEC_42621_2025"
      name: "Decreto nº 42.621/2025"
      subject: "Regulamentação atual da Lei Municipal nº 4.158/1992"
      status: "PARTIALLY_CONFIRMED_BY_FORM"
      evidence_status: "CONFIRMED_PARTIALLY_BY_DECLARACAO_REGIME_OCUPACAO"
