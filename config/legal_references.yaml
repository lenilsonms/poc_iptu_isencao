        benefit_validity: "PENDING_CONFIRMATION"
        request_deadline: "PENDING_CONFIRMATION"
      confirmed_by_uploaded_form:
        document: "Declaração do Regime de Ocupação"
        confirms:
          - "O formulário atual usa Decreto nº 42.621/2025"
          - "A Lei Municipal nº 4.158/1992, com alterações pelas Leis nºs 6.192/2006, 7.460/2016 e 8.285/2024, é indicada como regulamentada pelo Decreto nº 42.621/2025"
          - "Art. 3º — isenção incide apenas sobre o imóvel em que o beneficiário reside quando possuir mais de um imóvel no Município"
          - "Art. 5º — documento ou declaração falsa enseja indeferimento de plano e/ou cancelamento"
          - "Art. 6º — proventos de diversas fontes de renda devem ser comprovados"
          - "Art. 6º, parágrafo único — renda bruta mensal não pode ultrapassar cinco salários mínimos"
