# config/business_rules.yaml

metadata:
  config_name: business_rules
  version: "1.5.0-sprint3-admissibilidade"                   # <- bump
  depends_on:
    legal_references_version: "1.3.0-sprint1-vigencias"  # <- acompanha o bump abaixo
  changelog:
    - "1.5.0-sprint3-admissibilidade: Tabela 1 da SRC (prazos de tempestividade por exercício) como config; avaliadores determinísticos de tempestividade e legitimidade passam a produzir AdmissibilityFacts (Etapas 2 e 3 do fluxo oficial)."
    - "1.4.0-sprint2-modelo-decisao: precedência reorganizada em dois andares (admissibilidade A1–A3 antes do mérito M0–M5); novos estados NAO_CONHECIMENTO_SUGERIDO e JULGAMENTO_PREJUDICADO_SUGERIDO; motivo de indeferimento tipado (denial_ground)."
    - "1.4.0-sprint2-modelo-decisao: income_status passa a ser calculado deterministicamente (IncomeLimitCalculator) a partir das fontes extraídas e da tabela de SM; LLM não pode mais concluir ACIMA_DO_LIMITE (ADR-S2-05)."
    - "1.3.0-sprint1-fundacoes: tabela de salário mínimo estendida para 2003–2026 (fonte: passo a passo SRC, 07/07/2026)."
    - "1.3.0-sprint1-fundacoes: summary_denial habilitado para DEC_22429_2003 (art. 6º — falta de documentação)."
    - "1.2.0-poc-p0-fixes: adicionada seção conclusion_resolution com tabela de precedência ordenada e explícita."
    - "1.2.0-poc-p0-fixes: summary_denial do Decreto 42.621/2025 marcado como enabled=false (autoridade de indeferimento de plano PENDING_CONFIRMATION); rebaixa para VERIFICAR_MANUALMENTE."
  description: "Regras determinísticas da POC de isenção de IPTU."

conclusion_states:
  canonical:
    - INDEFERIMENTO_SUGERIDO
    - APTO_PARA_ANALISE_DE_DEFERIMENTO
    - VERIFICAR_MANUALMENTE
    - FORA_DO_ESCOPO_POC
    - NAO_CONHECIMENTO_SUGERIDO
    - JULGAMENTO_PREJUDICADO_SUGERIDO 

confidence_policy:
  minimum_confidence_for_ok: 0.70
  minimum_confidence_for_page_reference: 0.70
  below_threshold_status: "VERIFICAR"
  require_evidence_anchor: true
  rule: "Nenhuma página do PDF pode ser citada na minuta sem evidência textual ancorada."

scope:
  allowed_benefit_types:
    - APOSENTADO
    - PENSIONISTA
    - LOAS
  out_of_scope_benefit_types:
    - PRODUTOR_RURAL
    - OUTRO
  out_of_scope_result: "FORA_DO_ESCOPO_POC"

admissibility:
  timeliness:
    deadlines_by_year:
      2004: "2003-12-30"
      2007: "2006-10-31"
      2011: "2010-10-31"
      2015: "2014-10-31"
      2021: "2020-12-30"
      2024: "2024-02-07"
      2025: "2024-08-31"
      2026: "2025-08-31"
      2027: "2026-08-31"   
  legitimacy:
    qualifying_relationship_types:
      - "PROPRIETARIO"
      - "COPROPRIETARIO"
      - "COMPROMISSARIO"
      - "TITULAR_DOMINIO_UTIL"
      - "POSSUIDOR"
      - "CESSIONARIO"
      - "USUFRUTUARIO"

income_limit:
  unit: "SALARIO_MINIMO"
  multiplier: 5
  basis: "RENDA_BRUTA_MENSAL"
  aggregate_all_sources: true
  requires_confirmation: false
  status_if_income_document_missing: "VERIFICAR"
  status_if_other_source_undocumented: "VERIFICAR"
  status_if_income_above_limit: "INDEFERIMENTO_SUGERIDO"
  salario_minimo_por_ano:
    2003: 240.00
    2004: 260.00
    2005: 300.00
    2006: 350.00
    2007: 380.00
    2008: 415.00
    2009: 465.00
    2010: 510.00
    2011: 545.00
    2012: 622.00
    2013: 678.00
    2014: 724.00
    2015: 788.00
    2016: 880.00
    2017: 937.00
    2018: 954.00
    2019: 998.00
    2020: 1039.00
    2021: 1100.00
    2022: 1212.00
    2023: 1320.00
    2024: 1412.00
    2025: 1518.00
    2026: 1621.00
  reference_year_strategy:
    priority:
      - "regulatory_decree_rule"
      - "protocol_year"
      - "requested_year"
      - "fallback_verify_manually"

property_link:
  accepted_relationship_types:
    - PROPRIETARIO
    - COPROPRIETARIO
    - COMPROMISSARIO
    - TITULAR_DOMINIO_UTIL
    - POSSUIDOR
    - CESSIONARIO
    - USUFRUTUARIO
  uncertain_relationship_status: "VERIFICAR"
  missing_relationship_status: "NAO_APRESENTADO"
  automatic_denial_when_not_owner: false
  legal_basis: "Lei Municipal nº 6.793/2010, art. 7º"
  rule: "Não indeferir automaticamente por ausência de matrícula em nome do requerente."

multiple_properties:
  automatic_denial: false
  if_more_than_one_property_and_residence_confirmed:
    status: "OK"
    rule: "O benefício pode recair sobre o imóvel em que o beneficiário reside."
  if_more_than_one_property_and_residence_not_confirmed:
    status: "VERIFICAR"
    rule: "Havendo mais de um imóvel, exigir evidência de que o imóvel pleiteado é o imóvel de residência."

document_sufficiency:
  similar_document_does_not_satisfy_required_item: true
  examples:
    - required: "EXTRATO_RENDIMENTO_FONTE_PAGADORA"
      not_sufficient:
        - "CARTA_CONCESSAO_BENEFICIO"
        - "EXTRATO_BANCARIO"
    - required: "COMPROVANTE_RESIDENCIA"
      not_sufficient:
        - "CADASTRO_IMOBILIARIO_SEM_COMPROVANTE_RECENTE"

summary_denial:
  if_any_required_document_missing: true
  status: "INDEFERIMENTO_SUGERIDO"
  allow_only_when_missing_is_objective: true
  applies_only_when_legal_regime_allows_summary_denial: true
  legal_regime_rules:
    DEC_22429_2003:                      
      enabled: true
      legal_basis: "Decreto nº 22.429/2003, art. 6º"
    DEC_34767_2018:
      enabled: true
      legal_basis: "Decreto nº 34.767/2018, art. 7º"
    DEC_42621_2025:
      enabled: false
      status: "PENDING_CONFIRMATION"
      legal_basis: null
      note: >
        A autoridade de indeferimento de plano sob o Decreto nº 42.621/2025 ainda não foi
        confirmada por texto normativo integral (summary_denial = PENDING_CONFIRMATION em
        legal_references). O art. 5º desse decreto trata de documento/declaração FALSA, não
        de ausência de documento obrigatório, e portanto não fundamenta indeferimento de
        plano por documento ausente. Enquanto não confirmado, documento obrigatório ausente
        sob este regime rebaixa para VERIFICAR_MANUALMENTE em vez de INDEFERIMENTO_SUGERIDO.

# ---------------------------------------------------------------------------
# TABELA DE PRECEDÊNCIA DA CONCLUSÃO (P0)
# Resolução determinística do estado canônico de conclusão.
# Avaliada de cima para baixo; a PRIMEIRA regra cuja condição é satisfeita
# define o estado. A ordem é normativa para o ConclusionResolver.
# ---------------------------------------------------------------------------
admissibility_legal_basis:
  intempestividade:
    - "Lei Municipal nº 7.774/2019, art. 40 (subsidiariamente)"
  ilegitimidade:
    - "Lei Municipal nº 7.774/2019, art. 40, inciso II"
    - "Decreto nº 21.066/2000, art. 11"
    - "Decreto nº 25.345/2008, art. 7º"
  perda_de_objeto:
    - "Lei Municipal nº 7.774/2019, art. 35"
    - "Decreto nº 21.066/2000, art. 10"

conclusion_resolution:
  description: >
    Precedência v2 em DOIS ANDARES, na ordem do fluxo oficial da SRC: escopo ->
    admissibilidade (tempestividade, perda de objeto, legitimidade) -> mérito.
    Verificações NAO_AVALIADO são transparentes (ADR-S2-03). A ordem continua
    sendo o contrato do ConclusionResolver.

  ordered_rules:
    ordered_rules:
    - {id: "R1_FORA_DO_ESCOPO",            order: 1, conclusion: "FORA_DO_ESCOPO_POC"}
    - {id: "A1_INTEMPESTIVIDADE",          order: 2, condition: "admissibility.tempestividade == FALHA",
       conclusion: "NAO_CONHECIMENTO_SUGERIDO",
       main_reason: "Pedido intempestivo; sugere-se o não conhecimento."}
    - {id: "A2_PERDA_DE_OBJETO",           order: 3, condition: "admissibility.perda_de_objeto_detectada == true",
       conclusion: "JULGAMENTO_PREJUDICADO_SUGERIDO",
       main_reason: "Exercícios já tratados em processos anteriores; sugere-se julgamento prejudicado."}
    - {id: "A3_ILEGITIMIDADE",             order: 4, condition: "admissibility.legitimidade == FALHA",
       conclusion: "INDEFERIMENTO_SUGERIDO", denial_ground: "INEPCIA_DA_INICIAL",
       main_reason: "Requerente sem legitimidade; sugere-se indeferimento por inépcia da inicial."}
    - {id: "M0_REGIME_NAO_IDENTIFICADO",   order: 5, conclusion: "VERIFICAR_MANUALMENTE"}
    - {id: "M1_RENDA_ACIMA_DO_LIMITE",     order: 6, conclusion: "INDEFERIMENTO_SUGERIDO",
       denial_ground: "RENDA_ACIMA_DO_LIMITE",
       note: "income_status ACIMA_DO_LIMITE agora só é produzido pelo IncomeLimitCalculator (soma comprovada > 5 SM do exercício)."}
    - {id: "M2_DOCUMENTO_OBRIGATORIO_AUSENTE", order: 7, conclusion: "INDEFERIMENTO_SUGERIDO",
       denial_ground: "FALTA_DE_DOCUMENTACAO",
       requires_regime_summary_denial_confirmed: true,
       fallback_when_summary_denial_not_confirmed: "VERIFICAR_MANUALMENTE"}
    - {id: "M3_VERIFICACAO_MANUAL",        order: 8, conclusion: "VERIFICAR_MANUALMENTE"}
    - {id: "M4_APTO",                      order: 9, conclusion: "APTO_PARA_ANALISE_DE_DEFERIMENTO"}

  legal_basis_augmentation:
    description: >
      Artigos agregados ao fundamento conforme condições presentes, INDEPENDENTEMENTE da
      regra que definiu o estado. É o mecanismo que adiciona o art. 3º (outras fontes) ao
      fundamento do caso-ouro, somado ao art. 7º (indeferimento de plano) vindo de R3.
    rules:
      - id: "AUG_OUTRAS_FONTES_EM_ABERTO"
        when: "income.other_sources_flag is set AND income.income_status in ['VERIFICAR','ACIMA_DO_LIMITE']"
        add_basis_from: "regime.article_map.other_income_sources"
        rationale: "Há fonte de renda em aberto; cita-se o dispositivo de proventos de diversas fontes."

  non_determinant_warnings:
    description: "Sinais que geram alerta mas NÃO alteram o estado (precedência menor que R3)."
    rules:
      - id: "WARN_MULTIPLAS_INSCRICOES"
        when: "property.multiple_inscriptions_detected == true"
        warning: "Múltiplas inscrições detectadas; recomenda-se conferência manual da inscrição pleiteada."

manual_review:
  trigger_status: "VERIFICAR_MANUALMENTE"
  triggers:
    - "confidence_below_threshold"
    - "unclear_income"
    - "undocumented_other_income_source"
    - "uncertain_property_link"
    - "multiple_inscriptions_detected"
    - "document_type_ambiguous"
    - "regulatory_decree_not_identified"

audit:
  record_config_versions: true
  record_prompt_versions: true
  record_model_name: true
  record_timestamp: true
  record_input_file_hash: true